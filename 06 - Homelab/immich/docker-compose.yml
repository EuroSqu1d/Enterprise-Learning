# Immich: self-hosted photo + video backup. Google Photos replacement.
# Phone app auto-uploads in the background, web UI for browsing,
# AI-powered face/object/scene search, sharing, albums, the lot.
#
# Stack components:
#   - immich-server            Main API + web UI (port 2283)
#   - immich-machine-learning  Face recognition / object detection / CLIP search
#   - database (Postgres)      Photo metadata, users, albums (must be the
#                              pgvecto.rs / vectorchord variant — vanilla
#                              postgres WILL NOT WORK)
#   - redis                    Job queue + cache
#
# Design notes (same conventions as the rest of the stack):
#   - All four images pinned. Immich releases ~weekly; the four images
#     must all be on matching versions or the server fails to start.
#     Bump procedure: edit IMMICH_VERSION in .env, `docker compose pull`,
#     READ THE RELEASE NOTES (they almost always include DB migrations),
#     then `docker compose up -d`.
#   - UPLOAD_LOCATION is a BIND MOUNT (not a named volume) so you can
#     point it at a NAS share, external disk, or anywhere you have
#     space. Photo originals live there in a stable layout you can
#     read directly without going through Immich.
#   - Postgres data is in a named volume because it's an opaque
#     database, not user files. Backed up by the NAS via /var/lib/
#     docker/volumes — but read the README on Postgres-specific
#     backup gotchas before relying on that alone.
#   - Database password required (`:?` guard). Default user is fine.
#   - Own docker network — Immich's services find each other by name
#     (immich-server -> database -> redis). Nothing else needs to
#     reach in.
#   - Hardware acceleration (GPU transcoding, GPU ML) is OFF by
#     default. Opt in via the commented blocks below if you have one.

name: immich

services:

  # ----- Main server (API + web UI) ----------------------------------------
  immich-server:
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-v1.121.0}
    container_name: immich-server
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_started
      database:
        condition: service_healthy
    environment:
      DB_HOSTNAME: database
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:?set in .env}
      DB_DATABASE_NAME: ${DB_DATABASE_NAME:-immich}
      REDIS_HOSTNAME: redis
      TZ: ${TZ:-Etc/UTC}
    volumes:
      # The library path. Originals are stored here in a structured
      # layout (upload/, library/, thumbs/, encoded-video/, profile/).
      # Don't reorganise these folders by hand — Immich expects them.
      - ${UPLOAD_LOCATION:?set in .env}:/usr/src/app/upload
      # /etc/localtime ensures container clocks match host. Without
      # this EXIF timestamps and "today" filters get weird.
      - /etc/localtime:/etc/localtime:ro
    ports:
      # Web UI + API. cloudflared reaches this via host.docker.internal:2283.
      - "2283:2283"
    networks:
      - immich
    # --- Hardware transcoding (optional) -----------------------------------
    # For Intel/AMD iGPU acceleration of video transcodes. Uncomment +
    # set RENDER_GID in .env (find with: getent group render | cut -d: -f3).
    # devices:
    #   - /dev/dri:/dev/dri
    # group_add:
    #   - "${RENDER_GID:-104}"

  # ----- Machine learning service ------------------------------------------
  # Used for face recognition, object detection, and CLIP semantic search
  # ("a photo of a dog on a beach"). Downloads ML models on first use into
  # the model-cache volume (~1-3 GB depending on which features you enable).
  immich-machine-learning:
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION:-v1.121.0}
    container_name: immich-machine-learning
    restart: unless-stopped
    volumes:
      - model-cache:/cache
    networks:
      - immich
    # --- GPU acceleration (optional) ---------------------------------------
    # For NVIDIA: use the -cuda image tag instead of plain.
    # For OpenVINO (Intel iGPU): use the -openvino tag.
    # For ARM NN (Mali GPUs): use -armnn.
    # See https://immich.app/docs/features/ml-hardware-acceleration

  # ----- Redis -------------------------------------------------------------
  # Background job queue + session cache. Stateless from a user-data
  # perspective — wiping its volume is harmless, jobs just re-queue.
  redis:
    image: docker.io/redis:6.2-alpine
    container_name: immich-redis
    restart: unless-stopped
    healthcheck:
      test: redis-cli ping || exit 1
    networks:
      - immich

  # ----- Postgres (the pgvecto.rs variant) ---------------------------------
  # MUST be the vector-enabled postgres image. Vanilla `postgres:14`
  # will start but Immich migrations fail because it expects the
  # vectors extension for CLIP embedding storage.
  database:
    image: ghcr.io/immich-app/postgres:14-vectorchord0.3.0-pgvectors0.2.0
    container_name: immich-database
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?set in .env}
      POSTGRES_DB: ${DB_DATABASE_NAME:-immich}
      # Detects on-disk corruption early. Tiny perf cost, worth it.
      POSTGRES_INITDB_ARGS: '--data-checksums'
    volumes:
      - immich-database:/var/lib/postgresql/data
    healthcheck:
      # depends_on `service_healthy` above gates server startup on this.
      test: >-
        pg_isready --dbname='$${POSTGRES_DB}' --username='$${POSTGRES_USER}' || exit 1
      interval: 5m
      start_period: 5m
    networks:
      - immich

# Named volumes — Immich-managed state.
volumes:
  immich-database:
  model-cache:

# Own bridge network. Immich's four services find each other by service
# name (e.g. immich-server resolves `database` to the Postgres container).
networks:
  immich:
    name: immich
