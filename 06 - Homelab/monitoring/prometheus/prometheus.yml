global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: homelab

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: node-exporter
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          host: homelab

  - job_name: cadvisor
    static_configs:
      - targets: ['cadvisor:8080']
        labels:
          host: homelab

  # Loki exposes its own internal metrics on /metrics. Scraping these
  # lets you build dashboards on log ingestion rate, query latency, etc.
  - job_name: loki
    static_configs:
      - targets: ['loki:3100']
        labels:
          host: homelab

  # Promtail too — useful for spotting when log shipping stalls.
  - job_name: promtail
    static_configs:
      - targets: ['promtail:9080']
        labels:
          host: homelab
